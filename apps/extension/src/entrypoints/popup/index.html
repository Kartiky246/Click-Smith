<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClickSmith</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        width: 280px;
        margin: 0;
        padding: 14px;
        background: #fff;
        color: #172033;
        font:
          13px/1.45 system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }
      h1 {
        margin: 0;
        color: #101827;
        font-size: 15px;
        letter-spacing: 0;
      }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }
      .status {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 0 8px;
        border: 1px solid #dbe3ef;
        border-radius: 999px;
        background: #f8fafc;
        color: #475467;
        font-size: 11px;
        font-weight: 650;
        white-space: nowrap;
      }
      .row {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin: 0;
      }
      label {
        color: #667085;
        font-size: 12px;
        font-weight: 650;
      }
      .dot {
        display: inline-block;
        width: 7px;
        height: 7px;
        margin-right: 6px;
        border-radius: 50%;
        background: #ef4444;
      }
      .on {
        background: #16a34a;
      }
      select {
        width: 100%;
        min-height: 34px;
        padding: 0 8px;
        border: 1px solid #cfd8e6;
        border-radius: 7px;
        background: #fff;
        color: #101827;
        font: inherit;
      }
      .hint {
        margin: 12px 0 0;
        padding-top: 10px;
        border-top: 1px solid #e7ebf2;
        color: #667085;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="top">
      <h1>ClickSmith</h1>
      <span id="status" class="status"><span class="dot off"></span>Checking</span>
    </div>
    <div class="row">
      <label for="agent">Agent</label>
      <select id="agent">
        <option value="claude">Claude Code</option>
        <option value="cursor">Cursor</option>
        <option value="codex">Codex</option>
        <option value="antigravity">Antigravity</option>
        <option value="generic">Generic</option>
      </select>
    </div>
    <p class="hint">Alt+Click a page element, then describe the edit in the overlay.</p>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
